<html lang="pt-br">
<head>

<header>
</header>
<body>
<div class="login_container">
            
            <h1>Auth Events Monitor</h1>
            
            <p>Insira suas credenciais para continuar</p>
            
            <form>
                
                <div class="input_login">
                    <label for="usuario">Email</label>
                    <input type="email" id="usuario" name="usuario" placeholder="Insira seu Email" required>
                </div>
                
                <div class="input_login">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Insira sua senha" required>
                </div>
                
                <button type="submit" class="btn_login" onclick="handleLogin(event)">Login</button>
            
            </form>
            
            <div class='footer_text'>Não tem uma conta? </div>
            
            <div class="cadastre_se_link">
                <a id="cadastre_se">Cadastre-se</a>
            </div>
        
</div>
